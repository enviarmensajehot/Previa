  <style>
    body {
      margin: 0;
      background: black;
      overflow: hidden; /* Evita que el usuario haga scroll */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover; /* Ajuste perfecto a la pantalla del móvil */
      display: block;
    }

    /* Botón de descarga flotante */
    .download-btn {
      position: absolute;
      top: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.75);
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      text-decoration: none;
      font-size: 14px;
      font-weight: bold;
      z-index: 50; /* Por encima de la capa de publicidad */
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.2);
      transition: background 0.3s;
    }

    .download-btn:active {
      background: rgba(255, 255, 255, 0.2);
    }

    /* Capa invisible para el primer clic (Publicidad) */
    .click-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* ESTILOS DEL MODAL (POPUP) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
      color: white;
      max-width: 85%;
      box-shadow: 0 10px 30px rgba(0,0,0,0.8);
    }

    .modal-box p {
      margin: 0 0 20px 0;
      font-size: 18px;
      line-height: 1.4;
    }

    .continue-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 30px;
      font-size: 16px;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      width: 100%;
    }
  </style>
</head>

<body>

<div class="video-container">
  <a href="video.mp4" download class="download-btn" id="btnDescarga">
    📥 Descargar
  </a>

  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <a href="https://soundfrankcoke.com/neprrqiw?key=a8d09cfb74cfd44b156948d6c312728c" 
     target="_blank" 
     class="click-layer">
  </a>
</div>

<div id="popupModal" class="modal-overlay">
  <div class="modal-box">
    <p>¿Quieres seguir viendo el video completo?</p>
    <button id="btnContinue" class="continue-btn">Continuar</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('mainVideo');
    const modal = document.getElementById('popupModal');
    const btnContinue = document.getElementById('btnContinue');
    const btnDescarga = document.getElementById('btnDescarga');
    const adLink = "https://soundfrankcoke.com/neprrqiw?key=a8d09cfb74cfd44b156948d6c312728c";

    let downloadUnlocked = false;

    // 1. Lógica del Botón de Descarga
    btnDescarga.addEventListener('click', function(e) {
      if (!downloadUnlocked) {
        e.preventDefault(); // Bloquea la descarga la primera vez
        downloadUnlocked = true; 
        window.open(adLink, '_blank'); // Abre publicidad
        this.innerHTML = "✅ Reintentar Descarga"; // Cambia el texto
      } 
      // Al segundo clic, se descargará el video.mp4 normalmente
    });

    // 2. Lógica del Popup Aleatorio (entre 10 y 18 segundos)
    const randomTime = Math.floor(Math.random() * (18000 - 10000 + 1) + 10000);

    setTimeout(() => {
      if (video) {
        video.pause();
        modal.style.display = 'flex';
      }
    }, randomTime);

    // 3. Botón Continuar del Popup
    btnContinue.addEventListener('click', function() {
      window.open(adLink, '_blank'); // Abre publicidad al dar a continuar
      modal.style.display = 'none';
      if(video) video.play();
    });
  });
</script>

</body>
</html>
