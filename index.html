<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi video a escondida de mi esposo 😱🔥</title>

  <meta property="og:title" content="Mi video a escondida de mi esposo 😱🔥">
  <meta property="og:description" content="No vas a creer lo que sucede en este video...">
  <meta property="og:image" content="https://i.postimg.cc/R0TGSRDd/i-(27).jpg.jpg">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <script data-goatcounter="https://eliasrd.goatcounter.com/count" async src="//gc.zgo.at/count.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: Arial, sans-serif;
    }

    .video-container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* CAPA DE PUBLICIDAD */
    .click-layer {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
    }

    /* BOTÓN DESCARGAR */
    .download-btn {
      position: absolute;
      top: 15px;
      right: 15px;
      background: rgba(0,0,0,0.7);
      color: white;
      padding: 8px 15px;
      border-radius: 6px;
      text-decoration: none;
      font-size: 14px;
      z-index: 50;
      cursor: pointer;
      border: 1px solid #444;
    }

    /* VENTANA EMERGENTE (MODAL) */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-box {
      background: #1a1a1a;
      border: 1px solid #333;
      padding: 25px;
      border-radius: 10px;
      text-align: center;
      color: white;
      max-width: 80%;
    }

    .continue-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 5px;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="video-container">
  <a href="video.mp4" download class="download-btn" id="btnDescarga">Descargar</a>

  <video id="mainVideo" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <a href="https://soundfrankcoke.com/neprrqiw?key=a8d09cfb74cfd44b156948d6c312728c"
     target="_blank"
     class="click-layer">
  </a>
</div>

<div id="popupModal" class="modal-overlay">
  <div class="modal-box">
    <p>¿Quieres seguir viendo el video?</p>
    <button id="btnContinue" class="continue-btn">Continuar</button>
  </div>
</div>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const video = document.getElementById('mainVideo');
    const modal = document.getElementById('popupModal');
    const btnContinue = document.getElementById('btnContinue');
    const btnDescarga = document.getElementById('btnDescarga');
    const adLink = "https://soundfrankcoke.com/neprrqiw?key=a8d09cfb74cfd44b156948d6c312728c";

    let downloadUnlocked = false;

    btnDescarga.addEventListener('click', function(e) {
      if (!downloadUnlocked) {
        e.preventDefault();
        downloadUnlocked = true;
        window.open(adLink, '_blank');
        this.innerHTML = "✅ Reintentar";
      }
    });

    const randomTime = Math.floor(Math.random() * (20000 - 10000 + 1) + 10000);

    setTimeout(() => {
      if (video) {
        video.pause();
        modal.style.display = 'flex';
      }
    }, randomTime);

    btnContinue.addEventListener('click', function() {
      window.open(adLink, '_blank');
      modal.style.display = 'none';
      if(video) video.play();
    });
  });
</script>

</body>
</html>
